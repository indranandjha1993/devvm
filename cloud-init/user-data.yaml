#cloud-config

package_update: true
package_upgrade: true

apt:
  sources:
    docker.list:
      source: "deb [arch=arm64] https://download.docker.com/linux/ubuntu $RELEASE stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

packages:
  # Base tools
  - build-essential
  - git
  - curl
  - wget
  - unzip
  - zip
  - jq
  - htop
  - tmux
  - vim
  - ca-certificates
  - gnupg
  - lsb-release
  - software-properties-common
  - apt-transport-https
  # Docker
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin
  # Databases
  - mysql-server
  - postgresql
  - postgresql-contrib
  - redis-server
  # PHP (use default Ubuntu packages - Questing ships PHP 8.4)
  - php
  - php-fpm
  - php-cli
  - php-common
  - php-mysql
  - php-pgsql
  - php-redis
  - php-xdebug
  - php-mbstring
  - php-xml
  - php-curl
  - php-zip
  - php-gd
  - php-intl
  - php-bcmath
  # Python
  - python3
  - python3-venv
  - python3-dev
  - python3-pip
  - python3-full
  # Java
  - openjdk-21-jdk
  # Network tools
  - httpie
  - net-tools
  - dnsutils

groups:
  - docker

system_info:
  default_user:
    groups: [docker, sudo]

runcmd:
  - systemctl enable docker
  - systemctl start docker
  - systemctl enable mysql
  - systemctl enable postgresql
  - systemctl enable redis-server
  - echo "Cloud-init provisioning complete" > /tmp/cloud-init-done
