global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]
    scrape_interval: 10s

  - job_name: "mysqld_exporter"
    static_configs:
      - targets: ["host.docker.internal:9104"]

  - job_name: "postgres_exporter"
    static_configs:
      - targets: ["host.docker.internal:9187"]

  - job_name: "redis_exporter"
    static_configs:
      - targets: ["host.docker.internal:9121"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 10s

  # Apps registered via `devvm app add` (auto-discovered)
  - job_name: "devvm-apps"
    file_sd_configs:
      - files:
          - /opt/dev-vm/config/prometheus-apps.json
        refresh_interval: 30s
